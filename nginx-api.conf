# Mapeia a origem para o CORS de forma segura
map $http_origin $cors_origin {
    default "*";
    "~^http://localhost:8080$" $http_origin;
    "~^http://127\.0\.0\.1:8080$" $http_origin;
    "~^http://187\.77\.232\.228:8080$" $http_origin;
}

server {
    listen 3000;
    client_max_body_size 50m;

    location / {
        # Oculta QUALQUER cabeçalho de CORS que venha do PostgREST (Evita duplicação)
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Expose-Headers';
        proxy_hide_header 'Access-Control-Max-Age';
        proxy_hide_header 'Access-Control-Allow-Credentials';

        # Define os cabeçalhos de CORS do Nginx
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,apikey,Prefer,Content-Profile,x-client-info,Accept-Profile' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,Content-Profile' always;

        # Resposta imediata para Preflight (OPTIONS)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,apikey,Prefer,Content-Profile,x-client-info,Accept-Profile' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Reescreve o caminho para o PostgREST
        rewrite ^/rest/v1/(.*)$ /$1 break;
        
        # Força o role 'anon' (sem autenticação)
        proxy_set_header Authorization "";
        proxy_set_header apikey "";

        # Encaminha para o PostgREST
        proxy_pass http://postgrest:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
