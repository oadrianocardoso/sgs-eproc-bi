# Mapeia a origem para o CORS de forma segura
map $http_origin $cors_origin {
    default "*";
    "~^http://localhost:8080$" $http_origin;
    "~^http://127\.0\.0\.1:8080$" $http_origin;
    "~^http://187\.77\.232\.228:8080$" $http_origin;
}

server {
    listen 3000;
    client_max_body_size 50m;

    # Túnel Reverso para a API do TJSP (burlar CORS e proxy authentication)
    location /tjsp-api/ {
        # Resposta para CORS Preflight na API externa
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,Content-Type,Accept,X-Tjsp-Cookie' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Removendo CORS da origem para forçar os nossos
        proxy_hide_header 'Access-Control-Allow-Origin';
        
        # Adicionando os headers CORS corretos para o retorno
        add_header 'Access-Control-Allow-Origin' $cors_origin always;

        # Transformando o Cookie header
        proxy_set_header Cookie $http_x_tjsp_cookie;
        
        # Ajuste de identidade (Fingindo ser do próprio sistema deles)
        proxy_set_header Host suporte.tjsp.jus.br;
        proxy_set_header Origin https://suporte.tjsp.jus.br;
        proxy_set_header Referer https://suporte.tjsp.jus.br/;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;

        # Reescreve o caminho removendo o "/tjsp-api" e enviando o resto
        rewrite ^/tjsp-api/(.*)$ /$1 break;
        proxy_pass https://suporte.tjsp.jus.br;
    }

    location / {
        # Oculta QUALQUER cabeçalho de CORS que venha do PostgREST (Evita duplicação)
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Expose-Headers';
        proxy_hide_header 'Access-Control-Max-Age';
        proxy_hide_header 'Access-Control-Allow-Credentials';

        # Define os cabeçalhos de CORS do Nginx
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,apikey,Prefer,Content-Profile,x-client-info,Accept-Profile' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,Content-Profile' always;

        # Resposta imediata para Preflight (OPTIONS)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,apikey,Prefer,Content-Profile,x-client-info,Accept-Profile' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Encaminha para o PostgREST (Nossa API nativa)
        proxy_pass http://postgrest:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
