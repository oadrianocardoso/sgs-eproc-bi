server {
    listen 3000;

    location / {
        # Configura o CORS dinamicamente para aceitar a origem de quem acessa
        set $cors_origin "";
        if ($http_origin ~* (http://localhost:8080|http://127\.0\.0\.1:8080|http://187\.77\.232\.228:8080)$ ) {
            set $cors_origin $http_origin;
        }
        
        # Se for de outro lugar mas você quiser liberar geral para teste, use '*' ou remova o 'if'
        # Por enquanto vamos ser específicos para segurança.
        if ($cors_origin = "") {
            set $cors_origin "*";
        }

        # Limpa ABSOLUTAMENTE qualquer cabeçalho de CORS que venha do PostgREST
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Expose-Headers';

        # Cabeçalhos padrão para todos os requests bem sucedidos
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,apikey,Prefer' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        # Resposta específica para o Preflight (OPTIONS)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,apikey,Prefer' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Proxy to PostgREST
        # Se o caminho começar com /rest/v1/, removemos esse prefixo
        rewrite ^/rest/v1/(.*)$ /$1 break;
        
        # Força o role 'anon' no PostgREST removendo autenticação
        proxy_set_header Authorization "";
        proxy_set_header apikey "";

        proxy_pass http://postgrest:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
