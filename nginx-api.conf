server {
    listen 3000;
    
    # Enable CORS
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,apikey,x-client-info,Content-Profile,Accept-Profile,Prefer' always;
    add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,Content-Profile,Accept-Profile' always;

    location / {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,apikey,x-client-info,Content-Profile,Accept-Profile,Prefer' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Proxy to PostgREST
        # Se o caminho começar com /rest/v1/, removemos esse prefixo ao passar para o PostgREST
        rewrite ^/rest/v1/(.*)$ /$1 break;
        
        proxy_pass http://postgrest:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Force unauthenticated access by stripping Supabase keys
        # This makes PostgREST use the configured PGRST_DB_ANON_ROLE (anon)
        proxy_set_header Authorization "";
        proxy_set_header apikey "";

        # Hide PostgREST's own CORS headers to avoid duplicates (*, *)
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Expose-Headers';
    }
}
