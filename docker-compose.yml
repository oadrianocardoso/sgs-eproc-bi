# Docker Compose para SGS-EPROC-BI (Oráculo)
version: '3.8'

services:
  # Banco de Dados Local (Postgres)
  db:
    image: postgres:15-alpine
    container_name: sgs-eproc-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - sgs_db_data:/var/lib/postgresql/data
    restart: always

  # API Gateway (Proxy para emular Supabase /rest/v1 e resolver CORS)
  api-gateway:
    image: nginx:stable-alpine
    container_name: sgs-eproc-gateway
    ports:
      - "3000:3000"
    volumes:
      - ./nginx-api.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - postgrest
    restart: always

  # API Rest Local (PostgREST)
  postgrest:
    image: postgrest/postgrest:v12.0.2
    container_name: sgs-eproc-api
    # Removido mapping direto da 3000 para evitar conflito com o gateway
    environment:
      PGRST_DB_URI: postgres://postgres:password@db:5432/postgres
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_PORT: 3000
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET}
    depends_on:
      - db
    restart: always

  # Aplicação Frontend
  oraculo-bi:
    build: .
    container_name: sgs-eproc-bi
    ports:
      - "8080:80"
    restart: always
    environment:
      - NODE_ENV=production
    depends_on:
      - postgrest
      - api-gateway

  # Gerenciador Visual do Banco (Acessível via Chrome)
  pgadmin:
    image: dpage/pgadmin4
    container_name: sgs-eproc-admin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: always

volumes:
  sgs_db_data:
